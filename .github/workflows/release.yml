name: Release

# Triggered on semver tag push (e.g. v0.1.0).
# Publishes both ai-catapult (unscoped) and @r3dlex/ai-catapult (scoped)
# via publish-both.sh — the single source of truth for both names.
#
# Auth: npm TRUSTED PUBLISHING (OIDC) — no NPM_TOKEN secret needed.
# Prerequisite (one-time, npmjs.com web UI, per package — both ai-catapult and
# @r3dlex/ai-catapult): package Settings → Trusted Publisher → GitHub Actions
# with organization/user `r3dlex`, repository `ai-catapult`, workflow filename
# `release.yml`, environment empty. Both packages were first-published manually
# on 2026-07-02 (npm requires the package to exist before this can be set).
# Trusted publishing requires npm CLI >= 11.5.1 (upgraded in a step below).
#
# This workflow is inert until a tag matching v* is pushed.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for --provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          # NOTE: no registry-url here. setup-node's registry-url writes an
          # .npmrc _authToken=${NODE_AUTH_TOKEN} line with a placeholder value,
          # which can shadow the OIDC trusted-publishing exchange. Trusted
          # publishing needs no registry auth config at all.

      - name: Upgrade npm for trusted publishing (requires >= 11.5.1)
        run: |
          npm install -g npm@11.5.1
          npm --version

      - name: Vendor skills
        run: bash setup.sh

      - name: Verify vendor integrity
        run: bash scripts/verify-vendor.sh

      - name: Build both plugins
        run: |
          npm run build:plugin:claude
          npm run build:plugin:codex

      - name: Run tests
        run: npm test

      - name: Install smoke — real install against temp harness dirs
        run: |
          FAKE_HOME=$(mktemp -d)
          FAKE_CODEX=$(mktemp -d)
          mkdir -p "${FAKE_HOME}/.claude"
          export HOME="${FAKE_HOME}"
          export CODEX_HOME="${FAKE_CODEX}"
          node bin/ai-catapult.js install --harness all

      - name: Publish both names via OIDC trusted publishing (provenance automatic)
        run: AI_CATAPULT_PUBLISH=1 bash scripts/publish-both.sh --yes
        env:
          CI: 'true'
